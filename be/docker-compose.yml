services:
  backend:
    build: .
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=money_tracker
      - DB_USER=app_user
      - DB_PASSWORD=app_password
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_SECRET=dev-secret-change-in-prod
      - SESSION_DURATION=168h
      - CORS_ALLOWED_ORIGINS=http://localhost:4173,https://finiq.okuru.id
      - COOKIE_SECURE=false
      - ADMIN_EMAILS=admin@gmail.com
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_DB=money_tracker
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d money_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
