services:
  backend:
    image: ghcr.io/okuru-id/money-tracker-be:latest
    container_name: mt-backend
    restart: unless-stopped
    ports:
      - "8081:8080"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      - SERVER_PORT=8080
      - SERVER_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=money_tracker
      - DB_USER=${DB_USER:-app_user}
      - DB_PASSWORD=${DB_PASSWORD:-app_password}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - SESSION_DURATION=168h
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:4173}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-admin@gmail.com}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    image: ghcr.io/okuru-id/money-tracker-be:latest
    container_name: mt-migrate
    restart: "no"
    command: ["atlas", "migrate", "apply", "--env", "local"]
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=money_tracker
      - DB_USER=${DB_USER:-app_user}
      - DB_PASSWORD=${DB_PASSWORD:-app_password}
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/okuru-id/money-tracker-fe:latest
    container_name: mt-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    command: >
      sh -c "find /usr/share/nginx/html -type f -name '*.js' -exec sed -i \"s|http://localhost:8081|$${VITE_API_BASE_URL}|g\" {} + && nginx -g 'daemon off;'"
    ports:
      - "4173:80"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.1"
          memory: 16M
    depends_on:
      - backend

  postgres:
    image: postgres:17-alpine
    container_name: mt-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      - POSTGRES_DB=money_tracker
      - POSTGRES_USER=${DB_USER:-app_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-app_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app_user} -d money_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mt-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    command: redis-server --maxmemory 96mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
