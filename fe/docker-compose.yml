services:
  web:
    container_name: money-tracker-fe
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_APP_BASE_URL: ${VITE_APP_BASE_URL:-http://localhost:4173}
    ports:
      - "4173:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
